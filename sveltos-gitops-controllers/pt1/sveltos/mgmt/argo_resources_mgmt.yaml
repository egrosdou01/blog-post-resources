apiVersion: v1
kind: ConfigMap
metadata:
  name: argo-resources-mgmt
  namespace: default
data:
  argo_resources_mgmt.yaml: |
    ---
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: sveltos-manifests
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: "https://github.com/egrosdou01/blog-post-resources.git" # This needs to be changed to your own repo
        targetRevision: HEAD
        path: sveltos-gitops-controllers/pt1/sveltos/
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 3m0s
            factor: 2
    ---
    apiVersion: v1
    kind: Secret
    metadata:
      name: sveltos-repo-sync
      namespace: argocd
      labels:
        argocd.argoproj.io/secret-type: repository
    stringData:
      url: "https://github.com/egrosdou01/blog-post-resources.git" # This needs to be changed to your own repo
